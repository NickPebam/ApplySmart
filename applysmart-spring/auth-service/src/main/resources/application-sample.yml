server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/applysmart_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: YOUR_DB_PASSWORD_HERE
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: YOUR_JWT_SECRET_KEY_HERE
  expiration: 86400000
  refresh:
    expiration: 604800000
